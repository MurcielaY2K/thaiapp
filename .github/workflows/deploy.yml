name: Deploy ThaiQuest PWA

on:
  push:
    branches: [claude/thai-learning-rpg-app-JuASK]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install engine deps
        run: npm ci

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build PWA
        working-directory: web
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          cname: ''
          force_orphan: true
          commit_message: 'deploy: ThaiQuest PWA'
